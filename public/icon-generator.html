<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
  <canvas id="c192" width="192" height="192"></canvas>
  <canvas id="c512" width="512" height="512"></canvas>
  <canvas id="c180" width="180" height="180"></canvas>
  <script>
    function draw(ctx, size) {
      const grad = ctx.createLinearGradient(0,0,size,size);
      grad.addColorStop(0,'#f59e0b');
      grad.addColorStop(1,'#ea580c');
      ctx.fillStyle=grad;
      ctx.fillRect(0,0,size,size);
      ctx.fillStyle='white';
      const cx=size/2, cy=size/2, or=size*0.35, ir=size*0.14;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        let a=(i*72-90)*Math.PI/180;
        let x=cx+Math.cos(a)*or, y=cy+Math.sin(a)*or;
        if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        a=((i*72)+36-90)*Math.PI/180;
        x=cx+Math.cos(a)*ir; y=cy+Math.sin(a)*ir;
        ctx.lineTo(x,y);
      }
      ctx.closePath();
      ctx.fill();
    }
    draw(c192.getContext('2d'),192);
    draw(c512.getContext('2d'),512);
    draw(c180.getContext('2d'),180);
    document.body.innerHTML='<h2>Click links to save:</h2>'+
      '<a id="dl192" download="icon-192.png">Save 192x192</a><br>'+
      '<a id="dl512" download="icon-512.png">Save 512x512</a><br>'+
      '<a id="dl180" download="apple-touch-icon.png">Save Apple Touch</a>';
    dl192.href=c192.toDataURL();
    dl512.href=c512.toDataURL();
    dl180.href=c180.toDataURL();
  </script>
</body>
</html>
